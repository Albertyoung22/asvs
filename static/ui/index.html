  <script>
    (function () {
      const fatalBox = document.getElementById('fatal');
      function showFatal(msg) {
        if (!fatalBox) return;
        fatalBox.style.display = 'block';
        fatalBox.textContent = '主控台載入失敗：' + msg + '（請按 F12 檢查 Console 錯誤，或確認後端 /state 是否可存取）';
      }
      window.addEventListener('error', (e) => showFatal(e.message || '未知錯誤'));

      if (!('customElements' in window)) {
        showFatal('瀏覽器不支援 Web Components，請改用 Chrome/Edge/Firefox 新版');
        return;

      class UDPConsole extends HTMLElement {
        constructor() {
          super();
          this.attachShadow({ mode: "open" });
          this.state = {
            volume: 80, rate: "-20%", lang: "zh-TW", gender: "female",
            muted: false, playing: "idle", progress: 0, ngrok_url: null,
            timetable: { enabled: true, count: 0 },
            relay: {},
            auto_unmute_on_play: true,
            edge_tts_status: "Checking..."
          };
          // 🆕 內部輪詢控制（YT 下載檢測用）
          this._ytPoll = null;
          this._ytTick = null;
          this._ytStartNames = [];
          this._lastLangSet = 0; // Prevent poll flickering
          this._lastGenderSet = 0;
        }

        connectedCallback() {
          console.log("[UI] OmniSignal Console v2.1.2-GUID Connected");
          this.render();
          this.bind();
          // this.loadLocalSettings(); // Removed memory per user request
          this.fetchRelayConfig();  // 🆕 Sync relay config
          this.fetchChimeConfig();  // 🆕 Sync chime config
          this.refreshState();
          this._timer = setInterval(() => this.refreshState(), 1000);
        }

        disconnectedCallback() {
          if (this._timer) clearInterval(this._timer);
          if (this._ytPoll) clearInterval(this._ytPoll);
          if (this._ytTick) clearInterval(this._ytTick);
        }

        async translateSimple() {
          try {
            const $ = (s) => this.shadowRoot.querySelector(s);
            let srcSel = ($("#srcLangSimple")?.value || $("#srcLang")?.value || "").trim();
            let tgtSel = ($("#tgtLangSimple")?.value || $("#tgtLang")?.value || "zh").trim();
            const text = ($("#textSimple")?.value || $("#msg")?.value || "").trim();

            if (!text) {
              alert("請先輸入文字"); return;
            }

            const previewBox = $("#transPreview");
            const previewText = $("#transPreviewText");

            // Show status in preview
            previewText.textContent = "⌛ 翻譯中...";
            previewBox.style.display = "block";

            const norm = (x) => (x || "").toLowerCase();
            const canon = (x) => {
              x = norm(x);
              if (x === "zh-tw" || x === "zhtw" || x === "zh_hant") return "zh";
              if (x === "tw" || x === "nan-tw" || x === "nan_tw") return "nan";
              if (x === "" || x === "auto" || x === "detect") return "auto";
              return x;
            };

            const detectLang = (s) => {
              if (/[\u3400-\u9FFF\uF900-\uFAFF]/.test(s)) return "zh";
              if (/^[\x00-\x7F\s., ; : !?'"()\-\d]+$/.test(s)) return "en";
              return "auto";
            };

            let src = canon(srcSel);
            let tgt = canon(tgtSel);
            if (src === "auto") {
              const det = detectLang(text);
              src = (det && det !== tgt) ? det : "auto";
            }
            if (src === tgt) {
              if (tgt === "auto") tgt = "zh";
              src = "auto";
            }

            const isZh = (x) => x === "zh";
            const isNan = (x) => x === "nan";

            let translated = "";

            if ((isZh(src) || src === "auto") && isNan(tgt)) {
              const r = await fetch("/taigi/translate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, direction: "zh2nan" })
              });
              const j = await r.json();
              if (!r.ok || j.ok === false) throw new Error(j.error || "taigi translate failed");
              translated = j.text || "";
            } else if (isNan(src) && isZh(tgt)) {
              const r = await fetch("/taigi/translate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, direction: "nan2zh" })
              });
              const j = await r.json();
              if (!r.ok || j.ok === false) throw new Error(j.error || "taigi translate failed");
              translated = j.text || "";
            } else {
              const r = await fetch("/translate", {
                method: "POST", headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ q: text, source: src || "auto", target: tgt || "zh" })
              });
              const j = await r.json();
              if (!r.ok || j.ok === false) throw new Error(j.error || "translate failed");
              translated = j.translatedText || j.text || "";
            }

            if (translated) {
              previewText.textContent = translated;
              // Sync voice language if target is known
              const mapLang = (x) => {
                x = (x || "").toLowerCase();
                if (x.startsWith("ja")) return "ja-JP";
                if (x.startsWith("ko")) return "ko-KR";
                if (x.startsWith("vi")) return "vi-VN";
                if (x.startsWith("id")) return "id-ID";
                if (x === "nan") return "nan-TW";
                if (x === "en") return "en-US";
                return "zh-TW";
              };
              const langSel = $("#lang");
              if (langSel && tgt !== "auto") {
                langSel.value = mapLang(tgt);
                langSel.dispatchEvent(new Event("change"));
              }
            } else {
              previewBox.style.display = "none";
            }
          } catch (e) {
            console.error(e);
            alert("翻譯失敗：" + (e.message || e));
            this.shadowRoot.querySelector("#transPreview").style.display = "none";
          }
        }

      .hw-badge {

        html() {
          const s = this.state;
          const $ = (sel) => this.shadowRoot.querySelector(sel);

          // 🆕 Use local dropdown values for badges if available, otherwise fallback to server state
          const activeLang = ($("#lang")?.value) || s.lang || "-";

                    才能精準連動實體擴大機 (音響) 電源及訊號路徑切換。

                <div class="hw-badge ${s.relay ? '' : 'offline'}">

                  <div class="progress-wrap">

                  <span class="badge" style="background:${this.getTtsColor(s.edge_tts_status)};">Edge：${this.escape(s.edge_tts_status || "Checking...")}</span>
                  ${s.muted ? '<span class="badge" style="background:#ffecec;border-color:#ffcece;color:#8b1a1a">靜音</span>' : ""}
                </div>

        copyText(txt) {

            alert("已複製到剪貼簿！");
          }).catch(() => {
            prompt("請手動複製：", txt);
          });
        }

        getTtsColor(status) {
          if (!status || status === "OK") return "#ecfdf5";
          if (status === "Testing...") return "#fffbeb";
          if (status.includes("Error") || status.includes("Fail")) return "#fef2f2";
          return "white";
        }

        async fetchRelayConfig() {
          try {
            const r = await fetch('/api/get_relay_config');
            const j = await r.json();
            if (j.ok) {
              this.state.relay_auto = j.auto_on;
              const chk = this.shadowRoot.getElementById('chkAutoRelay');
              if (chk) chk.checked = !!j.auto_on;

              const sel = this.shadowRoot.getElementById('selRelayPort');
              if (sel && j.ports) {
                sel.innerHTML = '<option value="">(自動偵測)</option><option value="DISABLED">🔒 網頁直接控制 (停用後端)</option>';
                j.ports.forEach(p => {
                  const op = document.createElement("option");
                  op.value = p[0];
                  op.textContent = `${p[0]} - ${p[1]}`;
                  sel.appendChild(op);
                });
                sel.value = j.port || "";
              }
            }
          } catch (e) { console.error("Fetch relay config failed", e); }
        }

        async setRelayConfig(settings) {
          try {
            const r = await fetch('/api/set_relay_config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(settings)
            });
            const j = await r.json();
            if (j.ok) {
              console.log("Relay config updated:", j);
              if (j.auto_on !== undefined) this.state.relay_auto = j.auto_on;
              this.refreshState();
            } else {
              alert("更新設定失敗：" + (j.error || "Unknown"));
              this.fetchRelayConfig();
            }
          } catch (e) {
            console.error("Set relay config failed", e);
            this.fetchRelayConfig();
          }
        }

        async postForm(url, data) {
          try {
            const body = new URLSearchParams();
            for (let k in data) body.append(k, data[k]);

            // 🆕 Mirror to local Web Serial if connected
            if (data.cmd) {
              this.sendWebRelayCommand(data.cmd);
            }

            const r = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
              body
            });
            return await r.json();
          } catch (e) {
            console.error("postForm failed", e);
            // Optionally handle silent failure for commands if serial is used
          }
        }

        async postJSON(url, data) {
          try {
            // 🆕 If it's a speech or bell command and Web Serial is active, auto-trigger Relay ON
            if (this._serialWriter && (url.includes("speak") || url.includes("say") || (data && data.cmd && data.cmd.startsWith("Bell:")))) {
              this.sendWebRelayCommand("RelayOn");
            }

            const r = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
            return await r.json();
          } catch (e) { console.error("postJSON failed", e); }
        }

        async fetchChimeConfig() {
          try {
            const r = await fetch('/api/get_chime_config');
            const j = await r.json();
            if (j.ok) {
              const chk = this.shadowRoot.getElementById('chkChime');
              if (chk) chk.checked = !!j.enabled;
            }
          } catch (e) { console.error("Fetch chime config failed", e); }
        }

        async setChimeConfig(enabled) {
          try {
            const r = await fetch('/api/set_chime_config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ enabled: enabled })
            });
            const j = await r.json();
            if (!j.ok) {
              alert("更新提示音設定失敗");
              const chk = this.shadowRoot.getElementById('chkChime');
              if (chk) chk.checked = !enabled;
            }
          } catch (e) { console.error("Set chime config failed", e); }
        }

        render() {
          this.shadowRoot.innerHTML = `<style>${this.css()}</style>` + this.html();
        }

        bind() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          const _safeBind = (id, evt, fn) => {
            const el = $(id);
            if (el) el.addEventListener(evt, fn);
          };

          _safeBind("#btn-say", "click", () => this.sayText($("#msg").value.trim()));

          // 🆕 Chime Toggle
          _safeBind("#chkChime", "change", (e) => this.setChimeConfig(e.target.checked));

          // 🆕 錄音廣播 (Start/Stop Toggle)
          _safeBind("#btn-record-toggle", "click", () => this.toggleRecording());

          // 🆕 按住說話 (Hold to Talk) - 實現遠端麥克風
          const btnHold = $("#btn-hold-talk");

        // ===== Web Serial Logic =====
        async connectWebSerial() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          if (!navigator.serial) {
            alert("您的瀏覽器不支援 Web Serial API。請使用 Chrome 或 Edge 瀏覽器，並確保使用 HTTPS 連線。");
            return;
          }
          try {
            this._serialPort = await navigator.serial.requestPort();
            await this._serialPort.open({ baudRate: 9600 });
            this._serialWriter = this._serialPort.writable.getWriter();

            $("#web-serial-status").textContent = "狀態：🟢 已建立本機硬體連線";
            $("#web-serial-status").style.color = "#166534";
            $("#btn-web-serial-connect").style.display = "none";
            $("#btn-web-serial-disconnect").style.display = "block";

            console.log("[WebSerial] Port opened successfully.");
            // Send a test 'OFF' just to initialize
            await this.sendWebRelayCommand("RelayOff");
          } catch (e) {
            console.error("[WebSerial] Connect error:", e);
            alert("無法開啟序列埠：" + e.message);
          }
        }

        async disconnectWebSerial() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          try {
            if (this._serialWriter) {
              this._serialWriter.releaseLock();
              this._serialWriter = null;
            }
            if (this._serialPort) {
              await this._serialPort.close();
              this._serialPort = null;
            }
          } catch (e) { console.warn(e); }

          $("#web-serial-status").textContent = "狀態：未連接";
          $("#web-serial-status").style.color = "";
          $("#btn-web-serial-connect").style.display = "block";
          $("#btn-web-serial-disconnect").style.display = "none";
        }

        async sendWebRelayCommand(cmd) {
          if (!this._serialWriter) return;

          let bytes = null;
          // Standard LCUS / USB Relay Protocol
          if (cmd === "RelayOn" || cmd === "TestON") {
            bytes = [0xA0, 0x01, 0x01, 0xA2];
          } else if (cmd === "RelayOff" || cmd === "TestOFF") {
            bytes = [0xA0, 0x01, 0x00, 0xA1];
          } else if (cmd.startsWith("Relay4Set:")) {
            // Relay4Set:CH:ON|OFF
            const parts = cmd.split(":");
            const ch = parseInt(parts[1]);
            const on = parts[2] === "ON";
            // Chars for 4-CH (A0 [CH] [STATUS] [SUM])
            bytes = [0xA0, ch, on ? 1 : 0, (0xA0 + ch + (on ? 1 : 0)) & 0xFF];
          }

          if (bytes) {
            try {
              await this._serialWriter.write(new Uint8Array(bytes));
              console.log("[WebSerial] Executed local command:", cmd, bytes);
            } catch (e) {
              console.error("[WebSerial] Write failed", e);
              this.disconnectWebSerial();
            }
          }
        }

        // ===== Recording Logic =====
        toggleRecording() {
          if (this._isRecording) this.stopRecording();
          else this.startRecording();
        }

        async startRecording() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          if (this._isRecording) return;

          // Reset mode if triggered by Toggle button
          if (this._broadcastMode !== 'instant') this._broadcastMode = 'preview';

          // 🛡️ 安全性檢查：瀏覽器限制 getUserMedia 只能在 HTTPS 或 localhost 運作
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            const $ = (s) => this.shadowRoot.querySelector(s);
            const modal = $("#mic-help-modal");
            const originInput = $("#origin-url-input");

            if (modal && originInput) {
              originInput.value = window.location.origin;
              modal.style.display = "flex";
            } else {
              // Fail-safe if modal is missing for some reason
              alert("無法啟動麥克風，請使用 HTTPS 或 localhost。");
            }
            return;
          }

          try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            this._mediaRecorder = new MediaRecorder(stream);
            this._chunks = [];
            this._mediaRecorder.ondataavailable = e => this._chunks.push(e.data);
            this._mediaRecorder.onstop = () => this.uploadRecording();
            this._mediaRecorder.start();
            this._isRecording = true;

            const btn = $("#btn-record-toggle");
            const st = $("#recStatus");
            if (btn) {
              btn.style.background = "#e38b06";
              btn.textContent = "⏹ 停止錄音";
            }
            if (st) st.style.display = "";
          } catch (e) {
            console.error(e);
            alert("無法啟動麥克風：" + e.message);
          }
        }

        stopRecording() {
          if (!this._isRecording || !this._mediaRecorder) return;
          this._mediaRecorder.stop();
          this._isRecording = false;
          this._mediaRecorder.stream.getTracks().forEach(t => t.stop());

          const $ = (s) => this.shadowRoot.querySelector(s);
          const btn = $("#btn-record-toggle");
          const st = $("#recStatus");
          if (btn) {
            btn.style.background = "";
            btn.textContent = "🔴 開始錄音";
          }
          if (st) st.style.display = "none";
        }

        cancelRecording() {
          if (this._isRecording && this._mediaRecorder) {
            this._mediaRecorder.stop();
            this._mediaRecorder.stream.getTracks().forEach(t => t.stop());
            this._isRecording = false;
            this._chunks = []; // Clear chunks so uploadRecording does nothing (check below)

            const $ = (s) => this.shadowRoot.querySelector(s);
            const btn = $("#btn-record-toggle");
            const st = $("#recStatus");
            if (btn) {
              btn.style.background = "";
              btn.textContent = "🔴 開始錄音";
            }
            if (st) st.style.display = "none";
          }
        }

        async uploadRecording() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          if (!this._chunks || this._chunks.length === 0) return;

          const blob = new Blob(this._chunks, { type: 'audio/webm' });
          this._currentRecBlob = blob; // 暫存 blob

          // Mode check: Instant (Hold-To-Talk) vs Preview
          if (this._broadcastMode === 'instant') {
            // 直接傳送，不顯示預覽
            await this.sendCurrentRecording();
            return;
          }

          const previewUrl = URL.createObjectURL(blob);
          const audio = $("#recAudio");
          audio.src = previewUrl;

          // 顯示預覽 UI
          $("#recPreviewBox").style.display = "flex";
          $("#btn-record-toggle").style.display = "none"; // 暫時隱藏錄音鈕，避免重複錄音

          // 自動播放試聽
          try {
            await audio.play();
          } catch (e) {
            console.error("預覽播放失敗", e);
          }
        }

        async sendCurrentRecording() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          if (!this._currentRecBlob) {
            alert("錯誤：沒有錄音資料 (Blob is null)");
            return;
          }

          const btn = $("#btn-rec-send");
          const orgText = btn.textContent;
          btn.textContent = "⏳ 傳送中...";
          btn.disabled = true;

          const fd = new FormData();
          fd.append("file", this._currentRecBlob, "voice.webm");

          try {
            const r = await fetch("/api/speak_audio_blob", { method: "POST", body: fd });
            if (!r.ok) {
              const txt = await r.text();
              throw new Error(`Server ${r.status} ${r.statusText}: ${txt}`);
            }

            // Success: Auto-play (server side) and refresh list
            this.cancelCurrentRecording(); // Reset UI
            this.refreshFiles(); // Refresh file list to show new recording

            // Show status
            const st = $("#recStatus");
            if (st) {
              st.textContent = "✅ 已送出並播放";
              st.style.display = "";
              setTimeout(() => { if (st.textContent.includes("已送出")) st.style.display = "none"; }, 3000);
            }
          } catch (e) {
            console.error("Audio upload failed", e);
            alert("廣播傳送失敗：\n" + e.message);
            btn.textContent = orgText;
            btn.disabled = false;
          }
        }

        cancelCurrentRecording() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          this._currentRecBlob = null;
          $("#recAudio").pause();
          $("#recAudio").src = "";
          $("#recPreviewBox").style.display = "none";
          $("#btn-record-toggle").style.display = ""; // 恢復錄音鈕

          // Reset send button state in case it was stuck
          const btn = $("#btn-rec-send");
          if (btn) {
            btn.disabled = false;
            btn.textContent = "📤 傳送";
          }
        }

        filenameToTitle(name) {
          const base = String(name || "").split("/").pop();
          return decodeURIComponent(base).replace(/\.mp3$/i, "");
        }

        async playMP3OrYT() {
          const $ = (s) => this.shadowRoot.querySelector(s);
          const url = $("#mp3url").value.trim();
          if (!url) return;

          const isYT = this.isYouTubeUrl(url);
          if (isYT) {
            this._ytStartNames = await this.getFileNamesSafe();
            this.toggleYtWait(true);
            this.showYtLink("", "");
          }

          let hintedName = "";
          try {
            const body = new URLSearchParams();
            body.append("mp3url", url);
            const resp = await fetch("/sendmp3", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body,
              cache: "no-store"
            });
            try {
              const j = await resp.clone().json();
              hintedName = (j && (j.filename || j.saved_as || j.name || j.download)) ? String(j.filename || j.saved_as || j.name ||
                j.download) : "";
            } catch (_) { }
          } catch (e) {
            alert("請求失敗：" + e.message);
            this.toggleYtWait(false);
            return;
          }

          if (!isYT) return;

          if (hintedName) {
            const base = hintedName.split("/").pop();
            const label = this.filenameToTitle(base);
            this.showYtLink("/download/" + encodeURIComponent(base), label);
            this.toggleYtWait(false);
            this.refreshFiles();
            return;
          }

          this.detectYtDownloaded()
            .then(name => {
              if (name) {
                const base = name.split("/").pop();
                const label = this.filenameToTitle(base);
                this.showYtLink("/download/" + encodeURIComponent(base), label);
              } else {
                this.showYtLink("", "");
                alert("未偵測到新下載的 MP3（可能檔名覆蓋或後端未寫入 /files）。");
              }
            })
            .finally(() => {
              this.toggleYtWait(false);
              this.refreshFiles();
            });
        }

        isYouTubeUrl(u) {
          try { new URL(u); } catch { return false; }
          return /^(https?:\/\/)?(www\.)?(youtube\.com|youtu\.be)\//i.test(u);
        }

        toggleYtWait(show) {
          const $ = (s) => this.shadowRoot.querySelector(s);
          const row = $("#ytDlWait");
          const tick = $("#ytDlTick");
          if (!row) return;

          row.style.display = show ? "" : "none";
          if (show) {
            let sec = 0;
            tick.textContent = "";
            if (this._ytTick) clearInterval(this._ytTick);
            this._ytTick = setInterval(() => {
              sec++;
              tick.textContent = `（${sec}s）`;
            }, 1000);
          } else {
            if (this._ytTick) clearInterval(this._ytTick);
            if (tick) tick.textContent = "";
          }
        }

        showYtLink(href, label) {
          const $ = (s) => this.shadowRoot.querySelector(s);
          const box = $("#ytDlBox");
          const a = $("#ytDlLink");
          if (!box || !a) return;

          if (href) {
            a.href = href;
            a.textContent = label || href;
            a.title = label || href;
            box.style.display = "";
          } else {
            a.removeAttribute("href");
            a.textContent = "";
            a.removeAttribute("title");
            box.style.display = "none";
          }
        }

        async getFileNamesSafe() {
          try {
            const r = await fetch("/files", { cache: "no-store" });
            const j = await r.json();
            if (!j || !j.ok || !Array.isArray(j.files)) return [];
            return j.files.map(f => String(f.name || "")).filter(Boolean);
          } catch { return []; }
        }

        async detectYtDownloaded(timeoutMs = 120000, intervalMs = 2000) {
          const start = Date.now();
          const baseline = new Set(this._ytStartNames || []);
          return new Promise((resolve) => {
            if (this._ytPoll) clearInterval(this._ytPoll);
            this._ytPoll = setInterval(async () => {
              if (Date.now() - start > timeoutMs) {
                clearInterval(this._ytPoll);
                resolve("");
                return;
              }
              const names = await this.getFileNamesSafe();
              const added = names.filter(n => !baseline.has(n) && /\.mp3$/i.test(n));
              if (added.length > 0) {
                clearInterval(this._ytPoll);
                resolve(added[0]);
              }
            }, intervalMs);
          });
        }


        async sayText(text) {
          if (!text) return;
          const $ = (s) => this.shadowRoot.querySelector(s);
          const lang = $("#lang").value;
          const gender = $("#gender").value;
          try {
            // 🆕 Use new metadata-aware endpoint
            await this.postJSON("/api/speak_v2", { text, lang, gender });
          } catch (e) {
            alert("播放失敗：" + e.message);
          }
        }

        // Assuming this._timer is initialized elsewhere, e.g., in connectedCallback
        // The instruction implies setting the interval here or nearby.
        // For the purpose of this edit, I'll assume the instruction wants to ensure
        // the interval is set to 1000ms and the sync logic is updated.
        // If this._timer is not set in connectedCallback, it should be added there.
        // For now, I'll just ensure the refreshState logic is updated and assume
        // the timer setup is handled or implied by the instruction's context.
        // If this was a full class, I'd put `this._timer = setInterval(() => this.refreshState(), 1000);`
        // in `connectedCallback` and `clearInterval(this._timer)` in `disconnectedCallback`.

        async refreshState() {
          try {
            const r = await fetch("/state", { cache: "no-store" });
            if (!r.ok) throw new Error("/state 失敗：" + r.status);
            const s = await r.json();

            this.state = Object.assign({}, this.state, s || {});

            // 🆕 Web Serial Cloud-to-Local Sync Logic
            if (this._serialWriter) {
              // 1-CH Relay Sync
              if (s.relay && s.relay.status) {

                    console.log(`[Sync] Server CH${ch} changed to:`, isOn ? "ON" : "OFF");
                    this.sendWebRelayCommand(`Relay4Set:${ch}:${isOn ? "ON" : "OFF"}`);

          if (c.startsWith("zh")) return "zh";
          if (c.startsWith("en")) return "en";
          if (c.startsWith("ja")) return "ja";
          if (c.startsWith("ko")) return "ko";

          if (/[\u3040-\u30ff\u31f0-\u31ff]/.test(s)) return "ja";
          if (/[\u1100-\u11FF\uAC00-\uD7AF]/.test(s)) return "ko";
          if (/[ăâđêôơưĂÂĐÊÔƠƯ]/i.test(s)) return "vi";
          if (/[áàâăāēíìîīóòôōúùûū][1-9]?|[ⁿ·]/i.test(s) && /[a-z]/i.test(s)) return "nan";
          if (/^\s*[a-z0-9 ,.'-]+\s*$/i.test(s)) return "en";
          return "zh";
        }

  <!-- Taigi integration: add 'tw' and reroute fetch for tw ＋ 防止 source/target 相同 -->
  <script>
    (function () {
      const addTw = sel => {
        sel.forEach(s => {
          if (!s) return;
          const exists = Array.from(s.options || []).some(o => (o.value || '').toLowerCase() === 'tw');
          if (!exists) {
            const opt = document.createElement('option');
            opt.value = 'tw'; opt.textContent = '台語 (Taigi)';
            s.appendChild(opt);
          }
        });
      };
      addTw([
        document.querySelector('#toLang'),
        document.querySelector('#targetLang'),
        document.querySelector('#ttsLang'),
        document.querySelector('#speakLang'),
        document.querySelector('select[name=to]'),
        document.querySelector('select[name=target]'),
        document.querySelector('select[name=lang]')
      ]);

      const _fetch = window.fetch;
      window.fetch = async function (input, init) {
        try {
          const url = (typeof input === 'string') ? input : (input && input.url) || '';
          const isTranslate = /\/translate(\b|$)/.test(url);
          const isTTS = /\/(tts|speak)(\b|$)/.test(url);

          if ((isTranslate || isTTS) && init && init.method && init.method.toUpperCase() === 'POST') {
            let targetLang = '';
            let bodyObj = {};
            let ct = '';

            if (init.headers && (init.headers['Content-Type'] || (init.headers.get && init.headers.get('Content-Type')))) {
              ct = (init.headers['Content-Type'] || init.headers.get('Content-Type')).toLowerCase();
              if (ct.includes('application/json')) {
                try { bodyObj = JSON.parse(init.body); } catch (_) { bodyObj = {}; }
              } else if (ct.includes('application/x-www-form-urlencoded')) {
                const params = new URLSearchParams(init.body);
                params.forEach((v, k) => { bodyObj[k] = v; });
              }
            }

            const low = v => String(v || '').toLowerCase();
            const normCode = c => {
              c = low(c);
              if (!c) return '';
              return c.split(/[-_]/)[0];
            };

            targetLang = low(bodyObj.target || bodyObj.to || bodyObj.lang || '');
            let sourceLang = low(bodyObj.source || bodyObj.from || bodyObj.src || '');
            const srcNorm = normCode(sourceLang);
            const tgtNorm = normCode(targetLang);

            // 🔒 防呆：來源與目標一樣時，自動把 source 改成 auto，避免 PLEASE SELECT TWO DISTINCT LANGUAGES
            if (srcNorm && tgtNorm && srcNorm === tgtNorm) {
              if ('source' in bodyObj) bodyObj.source = 'auto';
              if ('from' in bodyObj) bodyObj.from = 'auto';
              if (!('source' in bodyObj) && !('from' in bodyObj)) bodyObj.source = 'auto';
            }

            if (ct.includes('application/json')) {
              init.body = JSON.stringify(bodyObj);
            } else if (ct.includes('application/x-www-form-urlencoded')) {
              const p2 = new URLSearchParams();
              Object.entries(bodyObj).forEach(([k, v]) => p2.append(k, v));
              init.body = p2.toString();
            }

            // Taigi 特例轉接：target = tw 時改走 /taigi API
            if (targetLang === 'tw') {
              if (isTranslate) {
                return _fetch('/taigi/translate', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    text: bodyObj.text || bodyObj.q || '',
                    source: bodyObj.source || bodyObj.from || 'zhtw',
                    target: 'tw'
                  })
                });
              }
              if (isTTS) {
                return _fetch('/taigi/tts', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({
                    text: bodyObj.text || bodyObj.q || '',
                    lang: 'tw',
                    gender: (bodyObj.gender || 'f')
                  })
                });
              }
            }
          }
        } catch (e) { console.warn('[Taigi fetch-wrap warn]', e); }
        return _fetch(input, init);
      };
    })();
  </script>

        if (r.ok) {
          btn.innerHTML = '<span>✅ 已取消</span>';
          setTimeout(() => { btn.innerHTML = originalText; btn.style.opacity = '1'; }, 1500);
          return;
        } else {
          btn.innerHTML = '<span>❌ 失敗</span>';
          setTimeout(() => { btn.innerHTML = originalText; btn.style.opacity = '1'; }, 2000);
          return;
        }

        btn.innerHTML = originalText;
        btn.style.opacity = '1';
      } catch (e) {
        console.error(e);
        const btn = document.getElementById('force-cancel-btn');
        btn.innerHTML = '<span>❌ 錯誤</span>';
        setTimeout(() => { btn.innerHTML = originalText; btn.style.opacity = '1'; }, 2000);
        return;
        document.getElementById('force-cancel-btn').innerHTML = originalText;
        document.getElementById('force-cancel-btn').style.opacity = '1';
      }
    });
    // Add hover effect
    const fcb = document.getElementById('force-cancel-btn');
    fcb.addEventListener('mousedown', () => fcb.style.transform = 'scale(0.95)');
    fcb.addEventListener('mouseup', () => fcb.style.transform = 'scale(1)');
    fcb.addEventListener('mouseleave', () => fcb.style.transform = 'scale(1)');
  </script>
  <!-- Audio Receiver for Redirected Audio -->
  <div id="audio-receiver-status"
    style="position:fixed; bottom:10px; right:10px; font-size:10px; color:#999; z-index:9999; background:rgba(0,0,0,0.1); padding:4px 8px; border-radius:4px; cursor:pointer;"
    onclick="window.testLocalAudio()">Audio Receiver: OFF (Click to Test)</div>
  <audio id="web-audio-player" style="display:none;"></audio>
  <script>
    (function () {
      const VER = "1.1";
      const API_BASE = (location.protocol === 'file:') ? 'http://localhost:5050' : '';
      let ws;
      const player = document.getElementById('web-audio-player');
      const status = document.getElementById('audio-receiver-status');

      const sessionId = Math.random().toString(36).substring(7);
      console.log(`[AudioReceiver] Started Session: ${sessionId}`);

      let audioQueue = [];
      let isPlaying = false;
      let lastAudioUrl = "";
      let lastAudioTs = 0;

      function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws/web`;

        console.log("[AudioWS] Connecting:", wsUrl);
        ws = new WebSocket(wsUrl);
        let heartbeat;

        ws.onopen = () => {
          status.textContent = "Audio Receiver: ON";
          status.style.color = "rgba(0, 150, 0, 0.7)";
          heartbeat = setInterval(() => { if (ws.readyState === 1) ws.send("PING"); }, 15000);
        };

        ws.onclose = () => {
          status.textContent = "Audio Receiver: OFF";
          status.style.color = "#999";
          clearInterval(heartbeat);
          setTimeout(connect, 5000);
        };

        ws.onmessage = async (e) => {
          if (e.data === "PONG") return;
          try {
            const data = JSON.parse(e.data);
            if (data.type === 'play_audio') {
              const msgGuid = data.guid || (data.ts + "_" + (data.url || "").split('?')[0]);
              const key = "played_" + msgGuid;

              // Random stagger (0-200ms) to prevent multiple tabs winning the race
              await new Promise(r => setTimeout(r, Math.random() * 200));

              if (localStorage.getItem(key)) {
                console.warn(`[AudioWS][${sessionId}] DEDUPE: Blocked by another tab.`, msgGuid);
                return;
              }
              localStorage.setItem(key, Date.now());

              // Cleanup old keys
              const now = Date.now();
              Object.keys(localStorage).forEach(k => {
                if (k.startsWith('played_')) {
                  const val = parseInt(localStorage.getItem(k));
                  if (!isNaN(val) && (now - val) > 60000) localStorage.removeItem(k);
                }
              });

              if (data.url === lastAudioUrl && (now - lastAudioTs) < 800) {
                console.log(`[AudioWS][${sessionId}] LOCAL DEDUPE: Throttle same URL.`, data.url);
                return;
              }
              lastAudioUrl = data.url; lastAudioTs = now;

              console.log(`[AudioWS][${sessionId}] PLAYING:`, data.url);
              audioQueue.push(data.url);
              processQueue();
            } else if (data.type === 'stop_audio') {
              console.log(`[AudioWS][${sessionId}] STOP RECEIVED`);
              audioQueue = []; isPlaying = false;
              player.pause(); player.currentTime = 0;
            }
          } catch (err) {
            console.error("[AudioWS] Error:", err);
          }
        };
      }

      function processQueue() {
        if (isPlaying || audioQueue.length === 0) return;
        isPlaying = true;
        let url = audioQueue.shift();
        if (url.startsWith('/') && API_BASE) url = API_BASE + url;

        player.onended = () => { isPlaying = false; setTimeout(processQueue, 100); };
        player.onerror = () => { isPlaying = false; setTimeout(processQueue, 100); };

        player.muted = false;
        player.volume = 1.0;
        player.src = url;
        player.play().catch(err => {
          console.warn("[AudioWS] Play blocked", err);
          isPlaying = false;
          audioQueue.unshift(url);
          showGestureBtn();
        });
      }

      function showGestureBtn() {
        if (document.getElementById('play-gesture-btn')) return;
        const btn = document.createElement('button');
        btn.id = 'play-gesture-btn';
        btn.textContent = "🔊 點擊啟用背景廣播聲音";
        btn.style = "position:fixed; bottom:60px; right:20px; z-index:10000; padding:12px 24px; background:linear-gradient(135deg, #4f46e5, #ec4899); color:white; border:none; border-radius:15px; box-shadow:0 8px 20px rgba(0,0,0,0.3); font-weight:bold; cursor:pointer;";
        btn.onclick = () => { player.play().catch(e => { }); btn.remove(); processQueue(); };
        document.body.appendChild(btn);
      }

      window.testLocalAudio = () => {
        const testUrl = (API_BASE || '') + "/api/audio_proxy?path=ClassStart.mp3";
        new Audio(testUrl).play().then(() => alert("OK")).catch(e => alert(e));
      };

      connect();
    })();

    // ==========================================
    // Render Free Tier Keep-Alive Mechanism
    // Pings the server every 10 minutes (600000 ms)
    // to prevent it from going to sleep (15-min limit)
    // ==========================================
    setInterval(() => {
      fetch(window.location.origin + '/?keepalive=' + Date.now())
        .then(res => console.log('[Render Keep-Alive] Ping successful:', res.status))
        .catch(err => console.error('[Render Keep-Alive] Ping failed:', err));
    }, 600000); // 10 minutes
  </script>
