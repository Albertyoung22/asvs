<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>4-Relay 控制台</title>
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, "Microsoft JhengHei", Segoe UI, Roboto, Arial;
      background: #f5f8fb;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: #1e7bd8;
      color: #fff;
    }

    header .title {
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    header .links a {
      color: #dff1ff;
      text-decoration: none;
      margin-left: 12px;
      font-size: 13px;
    }

    header .links .sep {
      color: rgba(255, 255, 255, 0.4);
      margin: 0 2px 0 10px;
      font-size: 11px;
    }

    header .right {
      font-size: 11px;
      opacity: .85;
      text-align: right;
    }

    main {
      padding: 12px;
      max-width: 960px;
      margin: 0 auto;
    }

    .info-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: #e5f2ff;
      border-radius: 8px;
      border: 1px solid #bfdbfe;
      font-size: 13px;
      color: #1f2933;
    }

    .info-left,
    .info-right {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 6px;
    }

    .label {
      font-weight: 600;
      margin-right: 2px;
    }

    .value {
      font-family: "Consolas", "SF Mono", Menlo, monospace;
      padding: 2px 6px;
      background: #fff;
      border-radius: 4px;
      border: 1px solid #d1e3ff;
    }

    .select-port {
      padding: 4px 8px;
      font-size: 13px;
      border-radius: 999px;
      border: 1px solid #cbd5e1;
      min-width: 140px;
    }

    .btn-port {
      padding: 4px 10px;
      font-size: 12px;
      border-radius: 999px;
      border: none;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
    }

    .btn-port.secondary {
      background: #6b7280;
    }

    .btn-port.ghost {
      background: #e5e7eb;
      color: #111827;
    }

    .btn-port+.btn-port {
      margin-left: 4px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-top: 12px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 12px 10px;
      box-shadow: 0 1px 4px rgba(15, 23, 42, .12);
      border: 1px solid #e5e7eb;
    }

    .card h2 {
      margin: 0 0 8px 0;
      font-size: 18px;
    }

    .status-pill {
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .status-on {
      background: #e5f8eb;
      color: #188a3a;
      border: 1px solid #8fd1a3;
    }

    .status-off {
      background: #f3f4f6;
      color: #555;
      border: 1px solid #d1d5db;
    }

    .btn-row {
      display: flex;
      gap: 6px;
    }

    button {
      border-radius: 999px;
      border: none;
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-on {
      background: #22c55e;
      color: #0b3b19;
    }

    .btn-off {
      background: #e5e7eb;
      color: #111827;
    }

    .log {
      margin-top: 16px;
      padding: 10px 12px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .08);
      font-size: 12px;
      color: #555;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #e5e7eb;
    }

    .log-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #111827;
    }

    .log-lines {
      font-family: "Consolas", "SF Mono", Menlo, monospace;
      white-space: pre-wrap;
      word-break: break-all;
    }

    .log-lines .error {
      color: #b91c1c;
    }

    @media (max-width:600px) {
      header {
        flex-direction: column;
        align-items: flex-start;
      }

      .info-bar {
        flex-direction: column;
        align-items: flex-start;
      }
    }
  </style>
  <script defer src="auth.js"></script>
</head>

<body>
  <header>

    <div class="title">🔌 4-Relay 控制台 <span id="wsDot" title="WebSocket 連線中…"
        style="font-size:14px;cursor:default;">🟡</span></div>
    <div class="links">
      <span id="nowText"
        style="margin-right:12px;opacity:.9;display:inline-block;min-width:140px;text-align:right">--:--:--</span>
      <a href="index.html">🎛 主控台</a>
      <a href="sched.html">🕐 排程</a>
      <a href="single_reservation.html">📅 預約</a>
      <a href="tt.html">📅 規律任務</a>
      <span class="sep">|</span>
      <a href="taigi_edu.html">🇹🇼 本土語</a>
      <a href="eew.html">🌋 地震</a>
      <a href="relay4.html">📣 分區</a>
      <a href="silent-dashboard.html">🔇 無聲</a>
      <span class="sep">|</span>
      <a href="live.html">🔴 直播</a>
      <a href="/devices">💻 設備</a>
      <a href="logs.html">🗒 紀錄</a>
    </div>
  </header>
  <main>
    <div class="info-bar">
      <div class="info-left">
        <span class="label">4-Relay COM：</span>
        <span class="value" id="portLabel">掃描中…</span>
        <span class="label">指定 COM（僅顯示偵測到的 USB Relay）：</span>
        <select id="portSelect" class="select-port">
          <option value="">自動偵測</option>
          <option value="DISABLED">🔒 網頁直接控制 (停用後端)</option>
        </select>
        <button class="btn-port" onclick="applyPortSelection()">套用</button>
        <button class="btn-port secondary" onclick="clearPort()">清除指定</button>
        <button class="btn-port ghost" onclick="rescanPorts()">重新掃描 COM</button>
      </div>
      <div class="info-right">
        <span class="label">單 Relay 目前 COM：</span>
        <span class="value" id="backendPortLabel">未知</span>
        <span style="font-size:11px;color:#6b7280;">（請避免選到同一顆 COM）</span>
      </div>
      <div id="lastStatus" style="font-size:12px;color:#555;flex-basis:100%;margin-top:4px;">&nbsp;</div>

      <!-- 🆕 Web Serial for Local Control (Cloud Demo Mode Support) -->
      <div id="webSerialBox"
        style="margin-top:12px; padding:10px; background:#f0f9ff; border:1px solid #7dd3fc; border-radius:8px; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
        <div style="font-size:13px; font-weight:700; color:#0369a1;">🔗 瀏覽器直接控制本機 USB：</div>
        <button class="btn-port" id="btnConnectSerial" onclick="connectSerial()">🔌 連接本機 USB 繼電器</button>
        <button class="btn-port warn" id="btnDisconnectSerial" style="display:none; background:#dc2626;"
          onclick="disconnectSerial()">斷開連線</button>
        <span id="serialStatus" style="font-size:12px; color:#666;">（狀態：未連接）</span>
        <div style="font-size:11px; color:#64748b; flex-basis:100%;">提示：即使程式跑在雲端 Render，連上後您仍可在此控制接在您這台電腦上的實體硬體。</div>
      </div>
    </div>

    <div class="cards">
      <div class="card">
        <h2>CH1</h2>
        <div class="status-pill status-off" id="ch1Status">OFF</div>
        <div class="btn-row">
          <button class="btn-on" onclick="setRelay(1,true)">ON</button>
          <button class="btn-off" onclick="setRelay(1,false)">OFF</button>
        </div>
      </div>
      <div class="card">
        <h2>CH2</h2>
        <div class="status-pill status-off" id="ch2Status">OFF</div>
        <div class="btn-row">
          <button class="btn-on" onclick="setRelay(2,true)">ON</button>
          <button class="btn-off" onclick="setRelay(2,false)">OFF</button>
        </div>
      </div>
      <div class="card">
        <h2>CH3</h2>
        <div class="status-pill status-off" id="ch3Status">OFF</div>
        <div class="btn-row">
          <button class="btn-on" onclick="setRelay(3,true)">ON</button>
          <button class="btn-off" onclick="setRelay(3,false)">OFF</button>
        </div>
      </div>
      <div class="card">
        <h2>CH4</h2>
        <div class="status-pill status-off" id="ch4Status">OFF</div>
        <div class="btn-row">
          <button class="btn-on" onclick="setRelay(4,true)">ON</button>
          <button class="btn-off" onclick="setRelay(4,false)">OFF</button>
        </div>
      </div>
    </div>

    <div class="log">
      <div class="log-title">事件紀錄</div>
      <div id="logLines" class="log-lines">初始化中…</div>
    </div>
  </main>

  <script>
    let currentPort = '';
    let _serialPort = null;
    let _serialWriter = null;

    // 🆕 Web Serial Logic
    async function connectSerial() {
      if (!navigator.serial) {
        alert("您的瀏覽器不支援 Web Serial API，請使用 Chrome / Edge。");
        return;
      }
      try {
        _serialPort = await navigator.serial.requestPort();
        await _serialPort.open({ baudRate: 9600 });
        _serialWriter = _serialPort.writable.getWriter();

        document.getElementById('serialStatus').textContent = "🟢 已連線";
        document.getElementById('serialStatus').style.color = "#059669";
        document.getElementById('btnConnectSerial').style.display = "none";
        document.getElementById('btnDisconnectSerial').style.display = "inline-block";
        log("Web Serial: 已成功連線到本機 USB 裝置", false);
      } catch (e) {
        log("Web Serial 連線失敗: " + e.message, true);
      }
    }

    async function disconnectSerial() {
      try {
        if (_serialWriter) { _serialWriter.releaseLock(); _serialWriter = null; }
        if (_serialPort) { await _serialPort.close(); _serialPort = null; }
      } catch (e) { }
      document.getElementById('serialStatus').textContent = "（狀態：未連接）";
      document.getElementById('serialStatus').style.color = "";
      document.getElementById('btnConnectSerial').style.display = "inline-block";
      document.getElementById('btnDisconnectSerial').style.display = "none";
      log("Web Serial: 已斷開連線", false);
    }

    async function sendSerialBytes(ch, on) {
      if (!_serialWriter) return;
      // Protocol: A0 [CH] [STATUS] [SUM]
      const bytes = [0xA0, ch, on ? 1 : 0, (0xA0 + ch + (on ? 1 : 0)) & 0xFF];
      try {
        await _serialWriter.write(new Uint8Array(bytes));
        console.log("Web Serial Sent:", bytes);
      } catch (e) {
        log("Web Serial 寫入失敗: " + e.message, true);
        disconnectSerial();
      }
    }

    function log(msg, isError) {
      const box = document.getElementById('logLines');
      const t = new Date().toLocaleTimeString();
      const line = `[${t}] ${msg}`;
      const div = document.createElement('div');
      if (isError) div.classList.add('error');
      div.textContent = line;
      if (box.textContent === '初始化中…') box.textContent = '';
      box.prepend(div);
    }

    function rebuildPortOptions(ports, mainPort) {
      const sel = document.getElementById('portSelect');
      const previous = currentPort;
      sel.innerHTML = '';
      const optAuto = document.createElement('option');
      optAuto.value = '';
      optAuto.textContent = '自動偵測';
      sel.appendChild(optAuto);

      const optDisable = document.createElement('option');
      optDisable.value = 'DISABLED';
      optDisable.textContent = '🔒 網頁直接控制 (停用後端)';
      sel.appendChild(optDisable);

      if (!Array.isArray(ports) || ports.length === 0) {
        const optNo = document.createElement('option');
        optNo.value = '';
        optNo.textContent = '（目前無偵測到 USB Relay）';
        optNo.disabled = true;
        sel.appendChild(optNo);
        return;
      }

      ports.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        sel.appendChild(opt);
      });

      if (mainPort) {
        for (let i = 0; i < sel.options.length; i++) {
          const opt = sel.options[i];
          if (opt.value === mainPort) {
            opt.textContent = mainPort + '（單 Relay 已用）';
            opt.disabled = true;
            if (currentPort === mainPort) {
              currentPort = '';
              sel.value = '';
              log('注意：' + mainPort + ' 已由單 Relay 使用，4-Relay COM 已清除', true);
            }
          }
        }
      }

      // 如果之前選的 COM 仍在列表裡，維持選取
      if (previous && previous !== mainPort) {
        for (let i = 0; i < sel.options.length; i++) {
          if (sel.options[i].value === previous && !sel.options[i].disabled) {
            sel.value = previous;
            currentPort = previous;
            break;
          }
        }
      }
    }

    function applyPortSelection() {
      const sel = document.getElementById('portSelect');
      const v = sel.value;
      if (!v) {
        currentPort = '';
        log('4-Relay COM 改為「自動偵測」模式', false);
      } else if (v === 'DISABLED') {
        currentPort = 'DISABLED';
        log('⚠️ 已停用 4-Relay 後端控制，此時瀏覽器可搶佔序列埠進行直接控制', false);
      } else {
        currentPort = v;
        log('已指定 4-Relay COM：' + v, false);
      }
      fetchStatus();
    }


    function clearPort() {
      currentPort = '';
      const sel = document.getElementById('portSelect');
      sel.value = '';
      log('已清除 4-Relay 手動 COM，回到自動偵測', false);
      fetchStatus();
    }

    function rescanPorts() {
      log('重新掃描 USB Relay COM 中…', false);
      // 不改變 currentPort，只是重抓狀態與可用 COM 列表
      fetchStatus();
    }

    // 🆕 全域狀態追蹤
    let g_lastLocalChSync = {};

    function updateChStatus(chState) {
      if (!chState) return;
      for (let ch = 1; ch <= 4; ch++) {
        const el = document.getElementById('ch' + ch + 'Status');
        if (!el) continue;
        // 同時檢查數字 1 和字串 "1" (JSON 鍵值永遠是字串)
        const val = chState[ch] !== undefined ? chState[ch] : chState[String(ch)];
        const isOn = (val === 1 || val === true || val === "1");
        el.textContent = isOn ? 'ON' : 'OFF';
        el.classList.toggle('status-on', isOn);
        el.classList.toggle('status-off', !isOn);
      }
    }

    // ✅ 統一狀態處理 (UI 更新 + 實體同步)
    function processStateUpdate(data) {
      if (!data || !data.ch_state) return;

      // 1. 更新 UI 燈號
      updateChStatus(data.ch_state);

      // 2. 同步到實體 USB 繼電器 (Web Serial)
      if (_serialWriter) {
        for (let ch = 1; ch <= 4; ch++) {
          const val = data.ch_state[ch] !== undefined ? data.ch_state[ch] : data.ch_state[String(ch)];
          const serverOn = (val === 1 || val === true || val === "1");

          if (g_lastLocalChSync[ch] !== serverOn) {
            console.log(`[Sync] 實體同步 CH${ch} →`, serverOn);
            sendSerialBytes(ch, serverOn);
            g_lastLocalChSync[ch] = serverOn;
            log(`[同步] 實體 CH${ch} 已設為 ${serverOn ? 'ON' : 'OFF'}`, false);
          }
        }
      }

      // 3. 更新日誌連結
      if (data.last_cmd) {
        document.getElementById('lastStatus').textContent = '最新狀態：' + data.last_cmd + (data.port ? ` (${data.port})` : '');
      }
    }

    async function fetchStatus() {
      try {
        let url = '/relay4/status';
        if (currentPort) url += '?port=' + encodeURIComponent(currentPort);
        const res = await fetch(url);
        const j = await res.json();
        if (!j.ok) return;

        // 更新 COM 埠列表與顯示
        const mainPort = j.main_port || j.single_port || j.relay_port || "";
        document.getElementById('backendPortLabel').textContent = mainPort || '未知';
        const ports = j.usb_relay_ports || j.available_ports || [];
        rebuildPortOptions(ports, mainPort);

        const usedPort = j.port || '';
        if (currentPort)
          document.getElementById('portLabel').textContent = '指定：' + currentPort + (usedPort ? ` (實:${usedPort})` : '');
        else
          document.getElementById('portLabel').textContent = usedPort || '(自動偵測中)';

        // 執行統一更新
        processStateUpdate(j);

      } catch (e) {
        // console.error(e);
      }
    }

    function updateChStatus(chState) {
      if (!chState) return;
      for (let ch = 1; ch <= 4; ch++) {
        const el = document.getElementById('ch' + ch + 'Status');
        if (!el) continue;
        // 同時檢查數字 1 和字串 "1"
        const isOn = (chState[ch] === 1 || chState[ch] === true || chState[String(ch)] === 1 || chState[String(ch)] === true);
        el.textContent = isOn ? 'ON' : 'OFF';
        el.classList.toggle('status-on', isOn);
        el.classList.toggle('status-off', !isOn);
      }
    }

    async function setRelay(ch, on) {
      // 🆕 Web Serial: 如果本地連線，同時控制本地硬體
      if (_serialWriter) { sendSerialBytes(ch, on); }
      try {
        const payload = { ch, on };
        if (currentPort) payload.port = currentPort;
        const res = await fetch('/relay4/set', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const j = await res.json();
        if (!j.ok) {
          log('CH' + ch + ' 設定失敗：' + (j.error || 'unknown'), true);
          return;
        }
        // 更新狀態
        updateChStatus(j.ch_state || {});
        log('CH' + ch + ' → ' + (on ? 'ON' : 'OFF') + ' 成功', false);
      } catch (e) {
        log('CH' + ch + ' 設定例外：' + e, true);
      }
    }

    fetchStatus();
    setInterval(fetchStatus, 1500);  // 縮短輪詢時間 (1.5s) 以對齊 index.html 的靈敏度

    // ✅ WebSocket 即時同步核心
    let _ws4 = null;
    let _ws4Retry = 1000;

    function connectWS4() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      _ws4 = new WebSocket(proto + '//' + location.host + '/ws/web');

      _ws4.onopen = () => {
        _ws4Retry = 1000;
        const dot = document.getElementById('wsDot');
        if (dot) { dot.textContent = '🟢'; dot.title = 'WebSocket 已連線 (即時同步)'; }
        log('WebSocket 已連線', false);
      };

      _ws4.onmessage = (ev) => {
        try {
          const msg = JSON.parse(ev.data);
          if (msg.type === 'relay4_state' && msg.ch_state) {
            // ✅ 使用統一的狀態更新函式，確保 UI 和實體硬體同時對齊
            processStateUpdate(msg);
            log('[即時] 狀態已由遠端同步', false);
          }
        } catch (e) { }
      };

      _ws4.onerror = () => {
        const dot = document.getElementById('wsDot');
        if (dot) { dot.textContent = '🔴'; }
      };

      _ws4.onclose = () => {
        const dot = document.getElementById('wsDot');
        if (dot) { dot.textContent = '🟡'; }
        setTimeout(connectWS4, _ws4Retry);
        _ws4Retry = Math.min(_ws4Retry * 1.5, 10000);
      };
    }
    connectWS4();

  </script>
  <script>
    (function () {
      function pad2(n) { return String(n).padStart(2, '0'); }
      function fmt(d) { return d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate()) + ' ' + pad2(d.getHours()) + ':' + pad2(d.getMinutes()) + ':' + pad2(d.getSeconds()); }
      function startClock() { function tick() { var el = document.getElementById('nowText'); if (el) el.textContent = fmt(new Date()); } tick(); setInterval(tick, 1000); }
      document.addEventListener('DOMContentLoaded', startClock);
    })();
  </script>
</body>
